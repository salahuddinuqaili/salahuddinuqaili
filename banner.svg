<svg width="800" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161b2e" stroke-width="0.5"/>
    </pattern>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bottomline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6ec7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#b794f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="180" fill="#0a0e17" rx="6"/>
  <rect width="800" height="180" fill="url(#grid)" rx="6"/>

  <!-- soft scattered dots — stars / innocence -->
  <circle cx="65" cy="35" r="1.2" fill="#b794f6" opacity="0.35"/>
  <circle cx="140" cy="140" r="1" fill="#00d4ff" opacity="0.25"/>
  <circle cx="230" cy="28" r="0.9" fill="#ff6ec7" opacity="0.3"/>
  <circle cx="390" cy="22" r="1.1" fill="#b794f6" opacity="0.2"/>
  <circle cx="550" cy="155" r="1" fill="#00d4ff" opacity="0.3"/>
  <circle cx="620" cy="30" r="1.3" fill="#ff6ec7" opacity="0.25"/>
  <circle cx="710" cy="50" r="0.8" fill="#b794f6" opacity="0.35"/>
  <circle cx="750" cy="135" r="1.1" fill="#00d4ff" opacity="0.2"/>
  <circle cx="45" cy="100" r="0.9" fill="#ff6ec7" opacity="0.2"/>
  <circle cx="480" cy="150" r="1" fill="#b794f6" opacity="0.25"/>

  <!-- name -->
  <text x="400" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="600" fill="#e6edf3" text-anchor="middle" filter="url(#softglow)">Salahuddin Uqaili</text>

  <!-- tagline -->
  <text x="400" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle" letter-spacing="2" opacity="0.75">ARCHITECTURE DECISIONS &#xB7; AI ORCHESTRATION</text>

  <!-- bottom accent line -->
  <rect x="100" y="174" width="600" height="1.5" rx="1" fill="url(#bottomline)"/>
</svg>
